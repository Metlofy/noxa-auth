<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa Dashboard | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --safir: #0066ff; --neon: #00d2ff; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; }
        .neon-border { border: 1px solid var(--safir); box-shadow: 0 0 20px rgba(0, 102, 255, 0.2); }
        .card-blur { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-action { background: linear-gradient(90deg, #cc0000, #ff4b2b); transition: 0.3s; }
        .btn-action:hover { box-shadow: 0 0 15px #ff4b2b; transform: scale(1.02); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
            <h1 class="font-orbitron text-3xl font-bold tracking-tighter">NOXA <span style="color:var(--neon)">DASHBOARD</span></h1>
            <div class="text-right">
                <p class="text-gray-500 text-xs uppercase">Server Status</p>
                <p class="text-green-500 font-bold">CONNECTED</p>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="card-blur p-6 rounded-2xl neon-border">
                <h3 class="font-orbitron mb-6 text-blue-400"><i class="fas fa-key mr-2"></i> LISANS OLUSTUR</h3>
                <input type="text" id="owner" placeholder="Müşteri Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded mb-4 focus:border-blue-500 outline-none">
                <input type="text" id="ip" placeholder="Sunucu IP" class="w-full bg-white/5 border border-white/10 p-3 rounded mb-4 focus:border-blue-500 outline-none">
                <button onclick="genLicense()" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-500 transition">OLUSTUR</button>
                <div id="licOutput" class="hidden mt-4 p-3 bg-black/40 text-xs text-blue-300 break-all border border-dashed border-blue-900"></div>
            </div>

            <div class="card-blur p-6 rounded-2xl neon-border md:col-span-2">
                <h3 class="font-orbitron mb-6 text-red-500"><i class="fas fa-users mr-2"></i> CANLI YONETIM</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-gray-500 uppercase text-xs">
                            <tr>
                                <th class="pb-4">Oyuncu</th>
                                <th class="pb-4">ID</th>
                                <th class="pb-4">Durum</th>
                                <th class="pb-4 text-right">Islem</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm" id="playerList">
                            <tr class="border-t border-white/5">
                                <td class="py-4">Mete (xSquze)</td>
                                <td class="py-4 text-gray-400">#1</td>
                                <td class="py-4"><span class="text-green-400">Online</span></td>
                                <td class="py-4 text-right">
                                    <button onclick="sendAction('ban', 'Mete')" class="btn-action px-4 py-1 rounded text-xs font-bold">BANLA</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-8 card-blur p-6 rounded-2xl border border-white/5">
            <h3 class="font-orbitron mb-4 text-gray-400 text-sm">BANLI LISTESI</h3>
            <div id="banList" class="flex flex-wrap gap-4">
                <div class="bg-white/5 px-4 py-2 rounded-full border border-red-900/30 flex items-center">
                    <span class="text-sm mr-3">Hileci_123</span>
                    <button onclick="sendAction('unban', 'Hileci_123')" class="text-red-500 hover:text-white"><i class="fas fa-times-circle"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Buraya kendi Webhook linkini koyarsan siteden bastığın buton Discord'una gelir!
        const webhook = "https://discord.com/api/webhooks/1494071473843736717/_JtdFv6o0I-JbqoN9jZnDg-fDvGh3bMlLt3N61KbF-XPtSs68SH58mFQPY1MmF50v-DAY";

        function sendAction(type, target) {
            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🛡️ **NOXA PANEL ISLEM**\n**Tip:** ${type.toUpperCase()}\n**Hedef:** ${target}\n**Zaman:** ${new Date().toLocaleString()}`
                })
            });
            alert(target + " için " + type + " işlemi gönderildi!");
        }

        function genLicense() {
            const owner = document.getElementById('owner').value;
            const ip = document.getElementById('ip').value;
            const key = "NOXA-" + Math.random().toString(36).substr(2, 8).toUpperCase();
            const output = `"${key}": { "owner": "${owner}", "active": true, "ip": "${ip}" }`;
            document.getElementById('licOutput').innerText = output;
            document.getElementById('licOutput').classList.remove('hidden');
        }
    </script>
</body>
</html>
